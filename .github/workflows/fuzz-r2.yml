# Continuous fuzzing with R2-backed corpus.
#
# Corpus distribution: this workflow uses Cloudflare R2's anonymous
# public read endpoint (no auth, no secrets). The bucket must have
# a public R2 URL enabled in the Cloudflare dashboard ("Settings →
# R2.dev subdomain") OR a custom domain pointing at it.
#
# Layout under the public base (matches `fuzz-corpus.sh`'s S3 layout
# minus the bucket prefix):
#
#   <PUBLIC_BASE>/fuzz/<crate>/<target>.tar.gz
#
# A per-(crate,target) tarball is the simplest distribution: R2's
# public dev URL does NOT support directory listing (`ListBucket`)
# anonymously, so we can't `aws s3 sync` against it. Curl + tarball
# works with zero bucket-side config beyond enabling the public URL.
#
# Owner action items (one-time setup):
#   1. Enable the bucket's R2.dev public URL in the Cloudflare
#      dashboard (or wire up a custom domain).
#   2. Set the `ZENEXTRAS_R2_PUBLIC_BASE` repository variable
#      (Settings → Secrets and variables → Actions → Variables) to
#      that URL. Example: `https://pub-abcdef123456.r2.dev`.
#   3. Owner pushes corpus tarballs from a dev box via
#      `scripts/fuzz-corpus.sh push` then `tar czf` + authed upload
#      (CI is read-only).
#
# Until ZENEXTRAS_R2_PUBLIC_BASE is set, the "Pull corpus" step
# emits a warning and proceeds with an empty corpus (the fuzzer
# starts from in-tree seed inputs).

name: fuzz-r2

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: zentiff
            target: fuzz_decode
          - crate: zentiff
            target: fuzz_decode_limits
          - crate: zentiff
            target: fuzz_probe
          - crate: zensvg
            target: fuzz_parse
          - crate: zensvg
            target: fuzz_render
          - crate: zenpdf
            target: fuzz_render
          - crate: zenpdf
            target: fuzz_render_pages
    env:
      MAX_TOTAL_TIME: 600  # 10 minutes per target
      # Public R2 base URL. Set via repo Actions variables; if unset
      # the pull step skips the download and the fuzzer starts from
      # in-tree seed inputs only. Format: `https://pub-XXX.r2.dev`
      # or a custom domain (no trailing slash).
      ZENEXTRAS_R2_PUBLIC_BASE: ${{ vars.ZENEXTRAS_R2_PUBLIC_BASE }}
    steps:
      - uses: actions/checkout@v5

      - name: Install nightly + cargo-fuzz
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Pull corpus tarball from R2 (anonymous)
        run: |
          set -euo pipefail
          CRATE='${{ matrix.crate }}'
          TARGET='${{ matrix.target }}'
          OUT_DIR="${CRATE}/fuzz/corpus/${TARGET}"
          mkdir -p "${OUT_DIR}"
          if [ -z "${ZENEXTRAS_R2_PUBLIC_BASE:-}" ]; then
            echo "::warning::ZENEXTRAS_R2_PUBLIC_BASE is unset — starting from in-tree seeds only."
            exit 0
          fi
          URL="${ZENEXTRAS_R2_PUBLIC_BASE%/}/fuzz/${CRATE}/${TARGET}.tar.gz"
          echo "Fetching ${URL}"
          # `--fail` exits nonzero on 404/403; `--retry 3` smooths
          # transient blips. Missing tarballs are *not* fatal — the
          # bucket may not yet have one for a brand-new target.
          if curl -fsSL --retry 3 --retry-delay 2 -o /tmp/corpus.tar.gz "${URL}"; then
            tar -xzf /tmp/corpus.tar.gz -C "${OUT_DIR}"
            echo "Pulled $(ls "${OUT_DIR}" | wc -l) corpus entries."
          else
            echo "::warning::No corpus tarball at ${URL} — starting from in-tree seeds only."
          fi

      - name: Run fuzzer
        id: fuzz
        run: |
          cd ${{ matrix.crate }}
          cargo +nightly fuzz run --target x86_64-unknown-linux-gnu ${{ matrix.target }} -- \
            -max_total_time=${{ env.MAX_TOTAL_TIME }} \
            -print_final_stats=1 \
            2>&1 | tee /tmp/fuzz-${{ matrix.crate }}-${{ matrix.target }}.log

      # No push step: CI uses anonymous public read. The corpus is
      # owner-curated and pushed manually from a dev box via the
      # legacy `scripts/fuzz-corpus.sh push` flow with auth.

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: fuzz-crash-${{ matrix.crate }}-${{ matrix.target }}
          path: |
            ${{ matrix.crate }}/fuzz/artifacts/
            /tmp/fuzz-${{ matrix.crate }}-${{ matrix.target }}.log
          retention-days: 90

[package]
name = "zenpdf"
version = "0.1.0"
edition = "2024"
rust-version = "1.93"
license = "AGPL-3.0-only OR LicenseRef-Imazen-Commercial"
description = "PDF page renderer via hayro with page selection and render bounds"
categories = ["multimedia::images"]
keywords = ["pdf", "render", "rasterize", "hayro"]
repository = "https://github.com/imazen/zenpdf"
documentation = "https://docs.rs/zenpdf"
readme = "README.md"
exclude = ["CLAUDE.md", ".github/"]

[dependencies]
hayro = { version = "0.5.0", default-features = true }
hayro-syntax = "0.5.0"
rgb = { version = "0.8.53", default-features = false, features = ["as-bytes"] }
thiserror = { version = "2.0.18", default-features = false }
whereat = { version = "0.1.4", default-features = false }
zencodec = { version = "0.1.5", optional = true }
zenpixels = { version = "0.2.0", default-features = false, features = ["rgb", "std"] }

[dev-dependencies]
enough = "0.4.2"

[package.metadata.docs.rs]
all-features = true

[features]
default = []
zencodec = ["dep:zencodec"]

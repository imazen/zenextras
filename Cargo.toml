[package]
name = "zensvg"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "Apache-2.0 OR MIT"
description = "SVG rendering and lossless optimization with zencodec integration"
categories = ["multimedia::images", "graphics"]
keywords = ["svg", "svgz", "render", "optimize", "image"]
repository = "https://github.com/imazen/zensvg"

[lib]
name = "zensvg"

[dependencies]
resvg = "0.47.0"
usvg = "0.47.0"
tiny-skia = "0.12.0"

# zencodec integration (optional)
zencodec = { version = "0.1.11", optional = true }
zenpixels = { version = "0.2.2", optional = true }
enough = { version = "0.4.3", optional = true }

# SVG optimization (optional)
flate2 = { version = "1.1.9", optional = true }
quick-xml = { version = "0.39.2", optional = true }

[features]
default = ["std", "text"]
std = []
text = []
zencodec = ["dep:zencodec", "dep:zenpixels", "dep:enough"]
optimize = ["dep:flate2", "dep:quick-xml"]

[dev-dependencies]
